name: CI

on:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Each step runs independently so a failure points at the exact stage.
      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bunx vite build
